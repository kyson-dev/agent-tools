# Centralized Agent Rules and Constraints
# This file serves as the Single Source of Truth for both L3 Workflows (Prompt Context)
# and L2 Scripts (Validation Schemas).

git:
  commit:
    # Allowed Conventional Commits types
    allowed_types:
      - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert

    # Message formatting constraints
    subject_max_length: 85
    body_wrap_length: 90

    # Grouping strategies when generating a Smart Commit Plan
    max_groups: 8
    grouping_signals:
      - directory_proximity
      - import_dependency
      - change_type_affinity
      - shared_purpose

  # Automated Release Workflow Settings
  release:
    # Regex to validate the Tag name (Semantic Versioning)
    tag_regex: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"

  # Repository Safety Policies
  safety:
    protected_branches:
      - main
      - master
      - production
      - prod

    # If false, the agent must refuse direct commits/pushes to the branches above
    allow_direct_actions_to_protected: false

  # Performance and Token Limits for Diff Analysis
  diff:
    max_diff_lines_per_file: 500
    max_total_diff_lines: 3000
